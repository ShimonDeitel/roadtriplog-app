name: FamilyRoadTripLog
options:
  bundleIdPrefix: com.shimondeitel.roadtriplog
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  FamilyRoadTripLog:
    type: application
    platform: iOS
    sources:
      - path: FamilyRoadTripLog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.roadtriplog
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: FamilyRoadTripLog/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  FamilyRoadTripLogTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: FamilyRoadTripLogTests
      - path: FamilyRoadTripLog.storekit
    dependencies:
      - target: FamilyRoadTripLog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.roadtriplog.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  FamilyRoadTripLogUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: FamilyRoadTripLogUITests
    dependencies:
      - target: FamilyRoadTripLog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.roadtriplog.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  FamilyRoadTripLog:
    build:
      targets:
        FamilyRoadTripLog: all
        FamilyRoadTripLogTests: [test]
        FamilyRoadTripLogUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: FamilyRoadTripLog.storekit
    test:
      config: Debug
      storeKitConfiguration: FamilyRoadTripLog.storekit
      targets:
        - FamilyRoadTripLogTests
        - FamilyRoadTripLogUITests
    archive:
      config: Release
